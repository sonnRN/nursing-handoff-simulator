<!DOCTYPE html>
<html lang="ko" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clinician</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "error-container": "#ffdad6",
            "on-surface": "#171c22",
            "surface-dim": "#d6dae2",
            "primary-container": "#005eb8",
            "on-surface-variant": "#424752",
            "surface-tint": "#005db6",
            "inverse-on-surface": "#edf1f9",
            "on-tertiary-container": "#95eda4",
            "on-primary-container": "#c8daff",
            "inverse-surface": "#2c3137",
            "secondary-fixed": "#7af6eb",
            "primary-fixed": "#d6e3ff",
            "on-error": "#ffffff",
            "on-background": "#171c22",
            "secondary": "#006a63",
            "on-tertiary": "#ffffff",
            "surface-variant": "#dee3eb",
            "on-error-container": "#93000a",
            "on-tertiary-fixed-variant": "#005323",
            "primary": "#00478d",
            "tertiary": "#005324",
            "surface-container-highest": "#dee3eb",
            "secondary-container": "#77f4e8",
            "on-tertiary-fixed": "#00210a",
            "inverse-primary": "#a9c7ff",
            "tertiary-fixed": "#9df6ac",
            "on-secondary": "#ffffff",
            "outline-variant": "#c2c6d4",
            "error": "#ba1a1a",
            "surface-container-high": "#e4e8f0",
            "surface-container": "#eaeef6",
            "surface-container-low": "#f0f4fc",
            "on-primary": "#ffffff",
            "on-secondary-container": "#006f68",
            "surface": "#f7f9ff",
            "surface-bright": "#f7f9ff",
            "on-secondary-fixed": "#00201d",
            "outline": "#727783",
            "primary-fixed-dim": "#a9c7ff",
            "on-primary-fixed": "#001b3d",
            "tertiary-fixed-dim": "#82da92",
            "background": "#f7f9ff",
            "tertiary-container": "#0b6e33",
            "on-primary-fixed-variant": "#00468c",
            "on-secondary-fixed-variant": "#00504b",
            "secondary-fixed-dim": "#5bdacf"
          },
          fontFamily: {
            headline: ["Inter", "sans-serif"],
            body: ["Inter", "sans-serif"],
            label: ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            "2xl": "1rem",
            full: "9999px"
          },
          boxShadow: {
            ambient: "0 12px 32px rgba(23, 28, 34, 0.06)",
            clinical: "0 4px 20px -2px rgba(0, 0, 0, 0.05)"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-surface-container-low font-body text-on-surface antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
  <div id="appRoot"></div>
  <div id="appToast" class="app-toast" aria-live="polite" role="status"></div>

  <script src="runtime-config.js" defer></script>
  <script src="src/simulation/scenario.js" defer></script>
  <script src="src/simulation/evaluator.js" defer></script>
  <script src="handoff-engine.js" defer></script>
  <script src="stitch-ui-marketing.js" defer></script>
  <script src="stitch-ui-admin.js" defer></script>
  <script src="stitch-ui-selector.js" defer></script>
  <script src="stitch-ui-clinical.js" defer></script>
  <script src="stitch-app.js" defer></script>

</html>
