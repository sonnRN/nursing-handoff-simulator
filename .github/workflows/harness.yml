name: Harness

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AI_HANDOFF_DISABLE_REMOTE_FHIR: "true"
      FHIR_FETCH_TIMEOUT_MS: "4000"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run harness tests
        run: npm test
